
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4f46e5">
    <title>نظام التوصيل</title>
    
    <link rel="manifest" href="https://hr-directions.github.io/Delivery-man/manifest.json">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: sans-serif; }
        iframe { width: 100%; height: 100%; border: none; }
        
        #customModal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            display: none; align-items: center; justify-content: center; z-index: 9999;
            backdrop-filter: blur(5px);
        }
        .pop-in { animation: pop 0.3s ease-out; }
        @keyframes pop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <iframe src="https://hr-directions.github.io/Delivery-man/"></iframe>

    <div id="customModal">
        <div class="bg-white rounded-[30px] p-8 max-w-[340px] w-full text-center shadow-2xl pop-in mx-4">
            <div class="w-20 h-20 bg-indigo-100 rounded-3xl flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-truck text-4xl text-indigo-600"></i>
            </div>
            <h2 class="text-xl font-bold text-gray-800 mb-2">تثبيت تطبيق المناديب</h2>
            <p class="text-gray-500 text-sm mb-8 leading-relaxed">ثبت التطبيق الآن للوصول السريع ومتابعة الطلبات بدقة عالية.</p>
            
            <button id="mainActionBtn" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-indigo-200 active:scale-95 transition-all mb-4">
                تثبيت الآن
            </button>

            <button onclick="closeModal()" class="text-gray-400 text-sm hover:text-gray-600 transition-colors">ربما لاحقاً</button>
        </div>
    </div>

    <script>
        const modal = document.getElementById('customModal');
        const actionBtn = document.getElementById('mainActionBtn');
        let deferredPrompt;

        // 1. التقاط حدث التثبيت من المتصفح
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            showMyModal();
        });

        // 2. إظهار النافذة يدوياً بعد 4 ثوانٍ إذا لم تظهر تلقائياً
        setTimeout(() => {
            if (!window.matchMedia('(display-mode: standalone)').matches) {
                showMyModal();
            }
        }, 4000);

        function showMyModal() {
            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
        }

        // 3. برمجة الزر ليعمل في كل الحالات
        actionBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                // إذا كان المتصفح جاهزاً، اطلب التثبيت الرسمي
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') closeModal();
                deferredPrompt = null;
            } else {
                // إذا لم يكن المتصفح جاهزاً (مثل آيفون أو كروم المعلق)
                // وجهه لكيفية التثبيت اليدوي
                alert("لتثبيت التطبيق:\n1. اضغط على خيارات المتصفح (⋮)\n2. اختر 'تثبيت التطبيق' أو 'إضافة للشاشة الرئيسية'");
            }
        });

        // تسجيل الخدمة (ضروري جداً لكروم)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:application/javascript,self.addEventListener("fetch", (e) => {});');
        }
    </script>
</body>
</html>
